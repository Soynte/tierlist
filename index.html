<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPvP • Leaderboards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Press+Start+2P&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .header-font { font-family: 'Press Start 2P', sans-serif; }

        .leaderboard-table tr:nth-child(odd) { background-color: #18181b; }
        .leaderboard-table tr:hover { background-color: #27272a; }

        .tier-badge {
            font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 9999px;
            display: inline-flex; align-items: center; justify-content: center; background: #52525b;
            color: transparent; background-clip: text; -webkit-background-clip: text;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3); white-space: nowrap;
        }

        .modal { animation: modalPop 0.3s ease-out; }
        @keyframes modalPop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .player-head { border: 3px solid #18181b; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }

        .hof-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(145deg, #18181b, #111113);
            border: 2px solid #3b82f6; box-shadow: 0 0 40px -10px rgb(59 130 246);
        }
        .hof-card:hover { transform: translateY(-8px) scale(1.03); box-shadow: 0 35px 70px -15px rgb(59 130 246); border-color: #eab308; }

        .skin-display {
            background: #0a0a0a; border: 6px solid #18181b; border-radius: 24px;
            box-shadow: 0 0 60px -20px rgb(234 179 8), inset 0 0 40px rgba(255,255,255,0.08);
            overflow: hidden; padding: 20px;
        }
        .skin-render { width: 100%; max-width: 340px; height: 380px; object-fit: contain; filter: drop-shadow(0 20px 30px rgba(59, 130, 246, 0.5)); }

        .hof-header { background: linear-gradient(to right, #111113, #1f2937); border-bottom: 3px solid #eab308; }

        .dropdown-content { display: none; }
        .dropdown.active .dropdown-content { display: block; }
        .chevron { transition: transform 0.3s ease; }
        .dropdown.active .chevron { transform: rotate(180deg); }

        .tierpoints-dropdown { position: relative; }
        .tierpoints-dropdown-content {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
            background: #27272a;
            border: 2px solid #3b82f6;
            border-radius: 16px;
            padding: 12px;
            width: 260px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            z-index: 50;
            font-size: 13px;
        }
        .tierpoints-dropdown.active .tierpoints-dropdown-content { display: block; }
        .tierpoints-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 10px;
            border-radius: 8px;
            margin-bottom: 4px;
        }
        .tierpoints-item:hover { background: #3b82f6; color: white; }

        @media (max-width: 640px) {
            .tier-badge { font-size: 10px; padding: 2px 6px; }
            .tierpoints-dropdown-content { width: 240px; }
        }

        #podium-container, #normal-leaderboard, #hall-of-fame {
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fade-in { animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }

        .player-detail-modal-content {
            background: linear-gradient(145deg, #1f2937, #111827);
            box-shadow: 0 0 80px -20px rgb(234 179 8);
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<header class="bg-black border-b border-zinc-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-x-3">
            <div class="w-9 h-9 bg-blue-500 rounded-xl flex items-center justify-center text-2xl shadow-lg shadow-blue-500/50">⚔️</div>
            <div>
                <h1 class="header-font text-2xl tracking-wider text-blue-400">MyPvP</h1>
                <p class="text-xs text-zinc-500 -mt-1">LEADERBOARDS</p>
            </div>
        </div>

        <nav class="flex items-center gap-x-2 sm:gap-x-6 text-sm font-medium">
            <a href="#" onclick="switchCategory(0)" id="tab-0" class="tab-link px-3 sm:px-4 py-2 rounded-xl hover:bg-zinc-900 transition-colors">OVERALL</a>
            <div id="gamemodes-dropdown" class="relative dropdown">
                <button onclick="toggleGamemodes()" class="flex items-center gap-x-1 sm:gap-x-2 px-4 py-2 rounded-2xl hover:bg-zinc-900 transition-colors text-sm">
                    <span class="hidden sm:inline">GAME MODES</span>
                    <span class="sm:hidden">MODES</span>
                    <i class="fa-solid fa-chevron-down chevron"></i>
                </button>
                <div id="dropdown-content" class="dropdown-content absolute top-full left-0 mt-2 w-56 bg-zinc-900 rounded-2xl shadow-2xl border border-zinc-700 py-2 z-50">
                    <a href="#" onclick="switchCategory(1); event.stopImmediatePropagation()" id="tab-1" class="tab-link block px-6 py-3 hover:bg-zinc-800">CLASSIC</a>
                    <a href="#" onclick="switchCategory(2); event.stopImmediatePropagation()" id="tab-2" class="tab-link block px-6 py-3 hover:bg-zinc-800">UHC</a>
                    <a href="#" onclick="switchCategory(3); event.stopImmediatePropagation()" id="tab-3" class="tab-link block px-6 py-3 hover:bg-zinc-800">ONLY SWORD</a>
                    <a href="#" onclick="switchCategory(4); event.stopImmediatePropagation()" id="tab-4" class="tab-link block px-6 py-3 hover:bg-zinc-800">POT</a>
                </div>
            </div>
            <a href="#" onclick="switchCategory(5)" id="tab-5" class="tab-link px-3 sm:px-4 py-2 rounded-xl hover:bg-zinc-900 transition-colors">RETIRED</a>
            <a href="#" onclick="switchCategory(6)" id="tab-6" class="tab-link px-3 sm:px-4 py-2 rounded-xl hover:bg-zinc-900 transition-colors">HALL OF FAME</a>
        </nav>

        <div class="flex items-center gap-x-2">
            <button onclick="exportJSON()" class="flex items-center gap-x-2 bg-emerald-500 hover:bg-emerald-600 px-4 py-2.5 rounded-2xl font-semibold text-sm transition-colors">
                <i class="fa-solid fa-download"></i>
                <span class="hidden sm:inline">Export JSON</span>
            </button>

            <button onclick="showAddModal()" id="add-btn" class="flex items-center gap-x-2 bg-blue-500 hover:bg-blue-600 px-4 sm:px-5 py-2.5 rounded-2xl font-semibold text-sm transition-colors">
                <i class="fa-solid fa-plus"></i>
                <span id="add-btn-text" class="hidden sm:inline">ADD PLAYER</span>
                <span class="sm:hidden">ADD</span>
            </button>
            <button onclick="resetData()" class="flex items-center gap-x-2 bg-zinc-800 hover:bg-zinc-700 px-3 py-2.5 rounded-2xl text-sm transition-colors">
                <i class="fa-solid fa-rotate-right"></i>
            </button>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
    <div id="podium-container"><div id="podium" class="grid grid-cols-3 gap-6 mb-10"></div></div>

    <div id="normal-leaderboard" class="bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800 shadow-2xl">
        <div class="px-4 sm:px-8 py-5 border-b border-zinc-800 flex flex-wrap items-center justify-between gap-4">
            <h2 id="category-title" class="text-2xl font-semibold header-font tracking-widest">OVERALL LEADERBOARD</h2>
            
            <div class="flex items-center gap-6">
                <div id="tierpoints-dropdown" class="tierpoints-dropdown relative">
                    <button onclick="toggleTierpointsDropdown()" class="flex items-center gap-x-2 bg-zinc-800 hover:bg-zinc-700 px-5 py-2 rounded-2xl text-sm font-medium">
                        Tierpoints
                        <i id="tier-chevron" class="fa-solid fa-chevron-down text-xs"></i>
                    </button>
                    <div id="tierpoints-content" class="tierpoints-dropdown-content"></div>
                </div>

                <div class="flex items-center gap-x-4 text-sm">
                    <input id="search-input" onkeyup="if(event.key==='Enter') filterTable()" placeholder="Search player..." class="bg-zinc-800 border border-zinc-700 focus:border-blue-400 rounded-2xl px-4 py-2 w-48 sm:w-64 outline-none text-sm">
                    <button onclick="filterTable()" class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="leaderboard-table w-full">
                <thead>
                    <tr class="text-zinc-400 text-xs uppercase tracking-widest font-medium">
                        <th class="px-4 sm:px-8 py-5 text-left w-12">#</th>
                        <th class="px-4 py-5 text-left">PLAYER</th>
                        <th class="px-4 py-5 text-left">TIERS</th>
                        <th class="px-4 sm:px-6 py-5 text-right w-24">POINTS</th>
                        <th class="px-4 sm:px-8 py-5 text-right w-20"></th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body" class="text-sm divide-y divide-zinc-800"></tbody>
            </table>
        </div>
        <div id="empty-state" class="hidden py-16 text-center text-zinc-400">
            <i class="fa-solid fa-trophy text-6xl mb-4 opacity-30"></i>
            <p class="text-xl">No players yet</p>
        </div>
    </div>

    <div id="hall-of-fame" class="hidden">
        <div class="hof-header rounded-3xl px-6 sm:px-10 py-12 mb-10 text-center">
            <div class="flex justify-center items-center gap-x-4 mb-4">
                <i class="fa-solid fa-crown text-5xl text-amber-400"></i>
                <h2 class="text-5xl font-semibold header-font tracking-[6px] text-amber-300">HALL OF FAME</h2>
                <i class="fa-solid fa-crown text-5xl text-amber-400"></i>
            </div>
        </div>
        <div id="hof-grid" class="grid grid-cols-1 gap-10"></div>
    </div>
</main>

<!-- Modals and Player Detail Widget (unchanged) -->
<div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[999]">
    <div class="modal bg-zinc-900 rounded-3xl w-full max-w-lg mx-4 p-8">
        <h3 id="modal-title" class="text-2xl font-semibold mb-6">Add Player</h3>
        <div id="modal-content" class="space-y-6"></div>
        <div class="flex gap-x-3 mt-10">
            <button onclick="hideModal()" class="flex-1 py-4 text-zinc-400 hover:bg-zinc-800 rounded-2xl font-medium">Cancel</button>
            <button onclick="savePlayer()" class="flex-1 py-4 bg-blue-500 hover:bg-blue-600 rounded-2xl font-semibold">Save Changes</button>
        </div>
        <input type="hidden" id="edit-index">
        <input type="hidden" id="edit-mode">
    </div>
</div>

<div id="player-detail-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[1000]">
    <div class="player-detail-modal-content rounded-3xl w-full max-w-md mx-4 overflow-hidden relative">
        <button onclick="hidePlayerDetail()" class="absolute top-4 right-4 text-zinc-400 hover:text-white text-2xl z-10"><i class="fa-solid fa-xmark"></i></button>
        <div class="pt-8 pb-4 text-center">
            <div class="mx-auto w-28 h-28 rounded-full border-4 border-blue-400 overflow-hidden shadow-2xl">
                <img id="detail-head" src="" class="w-full h-full object-cover">
            </div>
            <h2 id="detail-name" class="text-3xl font-bold mt-4"></h2>
            <div id="detail-badge" class="inline-flex items-center gap-x-2 bg-gradient-to-r from-blue-400 to-blue-300 text-zinc-900 text-sm font-semibold px-5 py-1 rounded-3xl mt-2 shadow-inner"></div>
        </div>
        <div class="px-8 py-6 bg-black/30">
            <div class="flex justify-between items-center text-xs text-zinc-400 mb-2"><span>OVERALL POSITION</span></div>
            <div id="detail-position" class="flex items-center gap-x-3 bg-zinc-900 rounded-2xl px-5 py-3 text-lg font-semibold"></div>
        </div>
        <div class="px-8 py-6">
            <div class="text-xs text-zinc-400 mb-3 flex items-center gap-x-2"><i class="fa-solid fa-trophy"></i> TIERS</div>
            <div id="detail-tiers" class="grid grid-cols-4 gap-3"></div>
        </div>
        <div class="px-8 py-6 border-t border-zinc-800 flex justify-center">
            <a id="detail-namemc" href="#" target="_blank" class="flex items-center gap-x-2 bg-zinc-800 hover:bg-zinc-700 transition-colors px-6 py-3 rounded-2xl text-sm font-medium">
                <i class="fa-solid fa-globe"></i> View on NameMC
            </a>
        </div>
    </div>
</div>

<script>
    // ==================== DEINE FIREBASE KONFIGURATION ====================
    const firebaseConfig = {
        apiKey: "AIzaSyCtD6uiy0wSGbYHEYA6kT7DHCthmtVQa4Y",
        authDomain: "tierlist-5078e.firebaseapp.com",
        projectId: "tierlist-5078e",
        storageBucket: "tierlist-5078e.firebasestorage.app",
        messagingSenderId: "1054362121056",
        appId: "1:1054362121056:web:d35fef620a4b1b21e76405",
        measurementId: "G-5JVREFNWC7"
    };
    // =====================================================================

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let categories = ["Overall", "Classic", "UHC", "Only Sword", "Pot", "Retired", "Hall of Fame"];
    let data = {1: [], 2: [], 3: [], 4: [], 5: [], 6: []};
    let currentCategory = 0;
    let currentFilter = "";

    const tierValueMap = {
        "High Tier 1": 100, "Low Tier 1": 90,
        "High Tier 2": 80, "Low Tier 2": 70,
        "High Tier 3": 60, "Low Tier 3": 50,
        "High Tier 4": 40, "Low Tier 4": 30,
        "High Tier 5": 20, "Low Tier 5": 10
    };

    const gamemodeNames = {1:"Classic",2:"UHC",3:"Only Sword",4:"Pot"};
    const gamemodeIcons = {
        1: "https://subtiers.net/assets/trident-1c1a3e5a.svg",
        2: "https://mctiers.com/tier_icons/uhc.svg",
        3: "https://mctiers.com/tier_icons/sword.svg",
        4: "https://mctiers.com/tier_icons/pot.svg"
    };

    function getTierGradient(tier) {
        const map = {"High Tier 1":"linear-gradient(90deg, #b45309, #fcd34d)","Low Tier 1":"linear-gradient(90deg, #854d0e, #fde047)","High Tier 2":"linear-gradient(90deg, #6d28d9, #c4b5fd)","Low Tier 2":"linear-gradient(90deg, #5b21b6, #ddd6fe)","High Tier 3":"linear-gradient(90deg, #1e40af, #60a5fa)","Low Tier 3":"linear-gradient(90deg, #0e7490, #67e8f9)","High Tier 4":"linear-gradient(90deg, #166534, #4ade80)","Low Tier 4":"linear-gradient(90deg, #15803d, #86efac)","High Tier 5":"linear-gradient(90deg, #78350f, #d97706)","Low Tier 5":"linear-gradient(90deg, #854d0e, #f59e0b)"};
        return map[tier] || "linear-gradient(90deg, #52525b, #a1a1aa)";
    }

    function getTierValue(tier) { return tierValueMap[tier] || 0; }
    function getRetiredTotalValue(p) { return p.retiredTiers ? Object.values(p.retiredTiers).reduce((s,t)=>s+getTierValue(t),0) : 0; }

    function renderCompactTiers(player) {
        let html = '<div class="flex justify-between items-center w-full px-1 sm:px-2 gap-1">';
        [1,2,3,4].forEach(cat => {
            let tier = "-";
            let suffix = "";
            if (player.retiredTiers && player.retiredTiers[cat]) {
                tier = player.retiredTiers[cat];
                suffix = " (R)";
            } else if (player.tiers && player.tiers[cat]) {
                tier = player.tiers[cat];
            } else if (player.rank) {
                tier = player.rank;
            }
            const gradient = getTierGradient(tier);
            html += `<div class="flex flex-col items-center flex-1 min-w-0"><img src="${gamemodeIcons[cat]}" class="w-7 h-7 mb-1"><span class="tier-badge w-full text-center" style="background-image: ${gradient}">${tier}${suffix}</span></div>`;
        });
        html += '</div>';
        return html;
    }

    function renderTierpointsContent() {
        const tiers = [
            {name: "High Tier 1", pts: 100},{name: "Low Tier 1", pts: 90},
            {name: "High Tier 2", pts: 80},{name: "Low Tier 2", pts: 70},
            {name: "High Tier 3", pts: 60},{name: "Low Tier 3", pts: 50},
            {name: "High Tier 4", pts: 40},{name: "Low Tier 4", pts: 30},
            {name: "High Tier 5", pts: 20},{name: "Low Tier 5", pts: 10}
        ];
        let html = '';
        tiers.forEach(t => {
            const gradient = getTierGradient(t.name);
            html += `<div class="tierpoints-item"><span class="tier-badge" style="background-image: ${gradient}">${t.name}</span><span class="font-medium text-amber-300">${t.pts} Points</span></div>`;
        });
        return html;
    }

    function toggleTierpointsDropdown() {
        const dd = document.getElementById("tierpoints-dropdown");
        dd.classList.toggle("active");
        const chevron = document.getElementById("tier-chevron");
        chevron.style.transform = dd.classList.contains("active") ? "rotate(180deg)" : "rotate(0deg)";
    }

    function renderOverallPodium() { /* ... same as before ... */ }
    function renderOverall() { /* ... same as before ... */ }
    function renderTable() { /* ... same as before ... */ }
    function renderPodium() { /* ... same as before ... */ }
    function renderHallOfFame() { /* ... same as before ... */ }
    function renderAll() { /* ... same as before ... */ }

    // Real-time sync
    function loadFromFirebase() {
        db.ref('leaderboards').on('value', (snapshot) => {
            const fbData = snapshot.val();
            if (fbData) {
                data = fbData;
                renderAll();
            }
        });
    }

    function saveToFirebase() {
        db.ref('leaderboards').set(data);
    }

    function saveToStorage() {
        saveToFirebase();
    }

    function exportJSON() {
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "mvp_leaderboards.json";
        a.click();
    }

    window.onload = async function() {
        const saved = localStorage.getItem("mvp_leaderboards");
        if (saved) {
            data = JSON.parse(saved);
            await saveToFirebase();
            localStorage.removeItem("mvp_leaderboards");
        }
        loadFromFirebase();
        document.getElementById("tab-0").classList.add('bg-zinc-900','text-blue-400');
        document.getElementById("category-title").textContent = "OVERALL LEADERBOARD";
        renderAll();
    };
</script>
</body>
</html>
