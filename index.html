<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPvP • Leaderboards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Press+Start+2P&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .header-font { font-family: 'Press Start 2P', sans-serif; }

        .leaderboard-table tr:nth-child(odd) { background-color: #18181b; }
        .leaderboard-table tr:hover { background-color: #27272a; }

        .tier-badge {
            font-size: 12px; font-weight: 600; padding: 3px 11px; border-radius: 9999px;
            display: inline-flex; align-items: center; gap: 4px; background: #52525b;
            color: transparent; background-clip: text; -webkit-background-clip: text;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3); white-space: nowrap;
        }

        .modal { animation: modalPop 0.3s ease-out; }
        @keyframes modalPop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .player-head { border: 3px solid #18181b; box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }

        .hof-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(145deg, #18181b, #111113);
            border: 2px solid #3b82f6; box-shadow: 0 0 40px -10px rgb(59 130 246);
        }
        .hof-card:hover { transform: translateY(-8px) scale(1.03); box-shadow: 0 35px 70px -15px rgb(59 130 246); border-color: #eab308; }

        .skin-display {
            background: #0a0a0a; border: 6px solid #18181b; border-radius: 24px;
            box-shadow: 0 0 60px -20px rgb(234 179 8), inset 0 0 40px rgba(255,255,255,0.08);
            overflow: hidden; padding: 20px;
        }
        .skin-render { width: 100%; max-width: 340px; height: 380px; object-fit: contain; filter: drop-shadow(0 20px 30px rgba(59, 130, 246, 0.5)); }

        .hof-header { background: linear-gradient(to right, #111113, #1f2937); border-bottom: 3px solid #eab308; }

        .dropdown-content { display: none; }
        .dropdown.active .dropdown-content { display: block; }
        .chevron { transition: transform 0.3s ease; }
        .dropdown.active .chevron { transform: rotate(180deg); }

        .tiers-cell { font-size: 13px; }

        #podium-container, #normal-leaderboard, #hall-of-fame {
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1), transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .fade-in { animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<header class="bg-black border-b border-zinc-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-x-3">
            <div class="w-9 h-9 bg-blue-500 rounded-xl flex items-center justify-center text-2xl shadow-lg shadow-blue-500/50">⚔️</div>
            <div>
                <h1 class="header-font text-2xl tracking-wider text-blue-400">MyPvP</h1>
                <p class="text-xs text-zinc-500 -mt-1">LEADERBOARDS</p>
            </div>
        </div>
        <div class="flex items-center gap-x-8">
            <nav class="flex gap-x-6 text-sm font-medium items-center">
                <a href="#" onclick="switchCategory(0)" id="tab-0" class="tab-link px-4 py-2 rounded-xl hover:bg-zinc-900 transition-colors">OVERALL</a>
                <div id="gamemodes-dropdown" class="relative dropdown">
                    <button onclick="toggleGamemodes()" class="flex items-center gap-x-2 px-5 py-2.5 rounded-2xl hover:bg-zinc-900 transition-colors">
                        <span>GAME MODES</span>
                        <i class="fa-solid fa-chevron-down chevron"></i>
                    </button>
                    <div id="dropdown-content" class="dropdown-content absolute top-full left-0 mt-2 w-56 bg-zinc-900 rounded-2xl shadow-2xl border border-zinc-700 py-2 z-50">
                        <a href="#" onclick="switchCategory(1); event.stopImmediatePropagation()" id="tab-1" class="tab-link block px-6 py-3 hover:bg-zinc-800 transition-colors">CLASSIC</a>
                        <a href="#" onclick="switchCategory(2); event.stopImmediatePropagation()" id="tab-2" class="tab-link block px-6 py-3 hover:bg-zinc-800 transition-colors">UHC</a>
                        <a href="#" onclick="switchCategory(3); event.stopImmediatePropagation()" id="tab-3" class="tab-link block px-6 py-3 hover:bg-zinc-800 transition-colors">ONLY SWORD</a>
                        <a href="#" onclick="switchCategory(4); event.stopImmediatePropagation()" id="tab-4" class="tab-link block px-6 py-3 hover:bg-zinc-800 transition-colors">POT</a>
                    </div>
                </div>
                <a href="#" onclick="switchCategory(5)" id="tab-5" class="tab-link px-4 py-2 rounded-xl hover:bg-zinc-900 transition-colors">RETIRED</a>
                <a href="#" onclick="switchCategory(6)" id="tab-6" class="tab-link px-4 py-2 rounded-xl hover:bg-zinc-900 transition-colors">HALL OF FAME</a>
            </nav>
            <div class="flex items-center gap-x-3">
                <button onclick="showAddModal()" id="add-btn" class="flex items-center gap-x-2 bg-blue-500 hover:bg-blue-600 px-5 py-2.5 rounded-2xl font-semibold text-sm transition-colors">
                    <i class="fa-solid fa-plus"></i>
                    <span id="add-btn-text">ADD PLAYER</span>
                </button>
                <button onclick="resetData()" class="flex items-center gap-x-2 bg-zinc-800 hover:bg-zinc-700 px-4 py-2.5 rounded-2xl text-sm transition-colors">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
            </div>
        </div>
        <div class="flex items-center gap-x-2 text-xs text-zinc-400">
            <div class="bg-blue-500/10 text-blue-400 px-3 py-1 rounded-2xl flex items-center gap-x-1">
                <i class="fa-solid fa-circle-dot animate-pulse"></i> LIVE
            </div>
            <span id="last-updated" class="font-mono">just now</span>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-6 py-8">
    <div id="podium-container"><div id="podium" class="grid grid-cols-3 gap-6 mb-10"></div></div>
    <div id="normal-leaderboard" class="bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800 shadow-2xl">
        <div class="px-8 py-5 border-b border-zinc-800 flex items-center justify-between">
            <h2 id="category-title" class="text-2xl font-semibold header-font tracking-widest">OVERALL LEADERBOARD</h2>
            <div class="flex items-center gap-x-4 text-sm">
                <input id="search-input" onkeyup="if(event.key==='Enter') filterTable()" placeholder="Search player..." class="bg-zinc-800 border border-zinc-700 focus:border-blue-400 rounded-2xl px-4 py-2 w-64 outline-none text-sm">
                <button onclick="filterTable()" class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </div>
        <div class="overflow-x-auto">
            <table class="leaderboard-table w-full min-w-[1020px]">
                <thead>
                    <tr class="text-zinc-400 text-xs uppercase tracking-widest font-medium">
                        <th id="rank-header" class="px-8 py-5 text-left w-12">#</th>
                        <th class="px-4 py-5 text-left">PLAYER</th>
                        <th class="px-4 py-5 text-left min-w-[440px]">TIERS</th>
                        <th class="px-6 py-5 text-right w-28">POINTS</th>
                        <th class="px-8 py-5 text-right w-28"></th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body" class="text-sm divide-y divide-zinc-800"></tbody>
            </table>
        </div>
        <div id="empty-state" class="hidden py-16 text-center text-zinc-400">
            <i class="fa-solid fa-trophy text-6xl mb-4 opacity-30"></i>
            <p class="text-xl">No players yet</p>
        </div>
    </div>

    <div id="hall-of-fame" class="hidden">
        <div class="hof-header rounded-3xl px-10 py-12 mb-10 text-center">
            <div class="flex justify-center items-center gap-x-4 mb-4">
                <i class="fa-solid fa-crown text-5xl text-amber-400"></i>
                <h2 class="text-5xl font-semibold header-font tracking-[6px] text-amber-300">HALL OF FAME</h2>
                <i class="fa-solid fa-crown text-5xl text-amber-400"></i>
            </div>
        </div>
        <div id="hof-grid" class="grid grid-cols-1 gap-10"></div>
    </div>

    <div class="mt-12 text-center text-zinc-500 text-xs flex items-center justify-center gap-x-6">
        <p>Standalone HTML • Data auto-loaded from GitHub</p>
        <button onclick="exportData()" class="underline hover:text-blue-400">Export JSON</button>
        <button onclick="importData()" class="underline hover:text-blue-400">Import JSON</button>
    </div>
</main>

<!-- Modals -->
<div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[999]">
    <div class="modal bg-zinc-900 rounded-3xl w-full max-w-lg mx-4 p-8">
        <h3 id="modal-title" class="text-2xl font-semibold mb-6">Add New Player</h3>
        <div id="modal-content" class="space-y-6"></div>
        <div class="flex gap-x-3 mt-10">
            <button onclick="hideModal()" class="flex-1 py-4 text-zinc-400 hover:bg-zinc-800 rounded-2xl font-medium">Cancel</button>
            <button onclick="savePlayer()" id="save-btn" class="flex-1 py-4 bg-blue-500 hover:bg-blue-600 rounded-2xl font-semibold">Save</button>
        </div>
        <input type="hidden" id="edit-index">
        <input type="hidden" id="is-hof" value="false">
    </div>
</div>

<div id="player-detail-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[1000]">
    <div id="player-detail-content" class="player-detail-modal-content rounded-3xl w-full max-w-md mx-4 overflow-hidden relative">
        <button onclick="hidePlayerDetail()" class="absolute top-4 right-4 text-zinc-400 hover:text-white text-2xl z-10"><i class="fa-solid fa-xmark"></i></button>
        <div class="pt-8 pb-4 text-center">
            <div class="mx-auto w-28 h-28 rounded-full border-4 border-blue-400 overflow-hidden shadow-2xl">
                <img id="detail-head" src="" class="w-full h-full object-cover">
            </div>
            <h2 id="detail-name" class="text-3xl font-bold mt-4"></h2>
            <div id="detail-badge" class="inline-flex items-center gap-x-2 bg-gradient-to-r from-blue-400 to-blue-300 text-zinc-900 text-sm font-semibold px-5 py-1 rounded-3xl mt-2 shadow-inner"></div>
        </div>
        <div class="px-8 py-6 bg-black/30">
            <div class="flex justify-between items-center text-xs text-zinc-400 mb-2"><span>POSITION</span></div>
            <div id="detail-position" class="flex items-center gap-x-3 bg-zinc-900 rounded-2xl px-5 py-3 text-lg font-semibold"></div>
        </div>
        <div class="px-8 py-6">
            <div class="text-xs text-zinc-400 mb-3 flex items-center gap-x-2"><i class="fa-solid fa-trophy"></i> TIERS</div>
            <div id="detail-tiers" class="grid grid-cols-4 gap-3"></div>
        </div>
        <div class="px-8 py-6 border-t border-zinc-800 flex justify-center">
            <a id="detail-namemc" href="#" target="_blank" class="flex items-center gap-x-2 bg-zinc-800 hover:bg-zinc-700 transition-colors px-6 py-3 rounded-2xl text-sm font-medium">
                <i class="fa-solid fa-globe"></i> View on NameMC
            </a>
        </div>
    </div>
</div>

<script>
    let categories = ["Overall", "Classic", "UHC", "Only Sword", "Pot", "Retired", "Hall of Fame"];
    let data = {1: [], 2: [], 3: [], 4: [], 5: [], 6: []};
    let currentCategory = 0;
    let currentFilter = "";

    const tierValueMap = {"High Tier 1":10,"Low Tier 1":9,"High Tier 2":8,"Low Tier 2":7,"High Tier 3":6,"Low Tier 3":5,"High Tier 4":4,"Low Tier 4":3,"High Tier 5":2,"Low Tier 5":1};
    const gamemodeNames = {1:"Classic",2:"UHC",3:"Only Sword",4:"Pot"};
    const gamemodeIcons = {1:"⚔️",2:"🍎",3:"🗡️",4:"🧪"};

    function getTierGradient(tier) {
        const map = {"High Tier 1":"linear-gradient(90deg, #b45309, #fcd34d)","Low Tier 1":"linear-gradient(90deg, #854d0e, #fde047)","High Tier 2":"linear-gradient(90deg, #6d28d9, #c4b5fd)","Low Tier 2":"linear-gradient(90deg, #5b21b6, #ddd6fe)","High Tier 3":"linear-gradient(90deg, #1e40af, #60a5fa)","Low Tier 3":"linear-gradient(90deg, #0e7490, #67e8f9)","High Tier 4":"linear-gradient(90deg, #166534, #4ade80)","Low Tier 4":"linear-gradient(90deg, #15803d, #86efac)","High Tier 5":"linear-gradient(90deg, #78350f, #d97706)","Low Tier 5":"linear-gradient(90deg, #854d0e, #f59e0b)"};
        return map[tier] || "linear-gradient(90deg, #52525b, #a1a1aa)";
    }

    function getTierValue(tier) { return tierValueMap[tier] || 0; }
    function getRetiredTotalValue(p) { return p.retiredTiers ? Object.values(p.retiredTiers).reduce((s,t)=>s+getTierValue(t),0) : 0; }

    async function loadData() {
        const saved = localStorage.getItem("mvp_leaderboards");
        if (saved) {
            const parsed = JSON.parse(saved);
            Object.keys(data).forEach(k => data[k] = Array.isArray(parsed[k]) ? [...parsed[k]] : []);
            return;
        }
        try {
            const res = await fetch('./mvp_leaderboards.json');
            if (res.ok) {
                const json = await res.json();
                Object.keys(data).forEach(k => data[k] = Array.isArray(json[k]) ? [...json[k]] : []);
                localStorage.setItem("mvp_leaderboards", JSON.stringify(data));
            }
        } catch(e) {}
    }

    function saveToStorage() { localStorage.setItem("mvp_leaderboards", JSON.stringify(data)); }

    function renderCompactTiers(player, isRetired = false, isPrime = false) {
        let html = '<div class="flex justify-between items-center w-full px-2">';
        [1,2,3,4].forEach(cat => {
            let tier = "-";
            let suffix = "";
            if (isRetired) {
                tier = player.retiredTiers && player.retiredTiers[cat] ? player.retiredTiers[cat] : "-";
                suffix = tier !== "-" ? " (Retired)" : "";
            } else if (isPrime) {
                tier = player.primeTiers && player.primeTiers[cat] ? player.primeTiers[cat] : "-";
            } else if (player.rank) tier = player.rank;
            const gradient = getTierGradient(tier);
            html += `<div class="flex flex-col items-center flex-1"><div class="text-3xl mb-1">${gamemodeIcons[cat]}</div><span class="tier-badge" style="background-image: ${gradient}">${tier}${suffix}</span></div>`;
        });
        html += '</div>';
        return html;
    }

    function renderOverallPodium() {
        const container = document.getElementById("podium");
        const playerMap = new Map();
        [1,2,3,4].forEach(cat => data[cat].forEach(p => {
            let entry = playerMap.get(p.name) || {name: p.name, totalValue: 0, bestValue: 0};
            const val = getTierValue(p.rank);
            entry.totalValue += val;
            if (val > entry.bestValue) entry.bestValue = val;
            playerMap.set(p.name, entry);
        }));
        let list = Array.from(playerMap.values()).sort((a,b) => b.totalValue - a.totalValue || b.bestValue - a.bestValue).slice(0,3);
        let html = "";
        if (list.length >= 2) html += `<div class="text-center"><div class="relative mx-auto w-20 h-20 bg-gradient-to-br from-amber-300 to-yellow-400 rounded-2xl flex items-center justify-center text-4xl mb-3 shadow-xl">🥈</div><img src="https://mc-heads.net/avatar/${list[1].name}/64" class="player-head mx-auto rounded-2xl w-16 h-16 mb-2"><p class="font-bold">${list[1].name}</p></div>`;
        if (list.length >= 1) html += `<div class="text-center -mt-6"><div class="relative mx-auto w-24 h-24 bg-gradient-to-br from-yellow-400 to-amber-300 rounded-3xl flex items-center justify-center text-6xl mb-3 shadow-2xl ring-4 ring-blue-400">🥇</div><img src="https://mc-heads.net/avatar/${list[0].name}/64" class="player-head mx-auto rounded-3xl w-20 h-20 mb-2"><p class="font-bold text-xl">${list[0].name}</p></div>`;
        if (list.length >= 3) html += `<div class="text-center"><div class="relative mx-auto w-20 h-20 bg-gradient-to-br from-zinc-400 to-slate-300 rounded-2xl flex items-center justify-center text-4xl mb-3 shadow-xl">🥉</div><img src="https://mc-heads.net/avatar/${list[2].name}/64" class="player-head mx-auto rounded-2xl w-16 h-16 mb-2"><p class="font-bold">${list[2].name}</p></div>`;
        container.innerHTML = html || `<div class="col-span-3 py-8 text-center text-zinc-400">Add players to see the podium!</div>`;
    }

    function renderOverall() {
        const tbody = document.getElementById("leaderboard-body");
        const empty = document.getElementById("empty-state");
        const playerMap = new Map();
        [1,2,3,4].forEach(cat => data[cat].forEach(p => {
            let entry = playerMap.get(p.name) || {name: p.name, totalValue: 0, bestValue: 0};
            const val = getTierValue(p.rank);
            entry.totalValue += val;
            if (val > entry.bestValue) entry.bestValue = val;
            playerMap.set(p.name, entry);
        }));
        let fullList = Array.from(playerMap.values()).sort((a,b) => b.totalValue - a.totalValue || b.bestValue - a.bestValue);
        let displayedList = currentFilter ? fullList.filter(p => p.name.toLowerCase().includes(currentFilter.toLowerCase())) : fullList;
        if (displayedList.length === 0) { tbody.innerHTML = ""; empty.classList.remove("hidden"); return; }
        empty.classList.add("hidden");
        let html = "";
        displayedList.forEach(player => {
            const trueRank = fullList.findIndex(p => p.name === player.name) + 1;
            const totalPoints = player.totalValue || 0;
            html += `<tr class="transition-colors">
                <td class="px-8 py-5 font-mono text-blue-400 font-semibold">#${trueRank}</td>
                <td onclick="showPlayerDetail('${player.name}'); event.stopImmediatePropagation()" class="px-4 py-5 cursor-pointer hover:underline">
                    <div class="flex items-center gap-x-3"><img src="https://mc-heads.net/avatar/${player.name}/32" class="player-head w-8 h-8 rounded-xl"><span class="font-medium">${player.name}</span></div>
                </td>
                <td class="px-4 py-5 tiers-cell">${renderCompactTiers(player)}</td>
                <td class="px-6 py-5 font-mono text-amber-300 font-semibold text-right w-28">${totalPoints}</td>
                <td class="px-8 py-5 text-right flex items-center gap-x-4 justify-end">
                    <button onclick="editPlayer(${player.id}); event.stopImmediatePropagation()" class="text-blue-400 hover:text-blue-300"><i class="fa-solid fa-pen"></i></button>
                    <button onclick="deletePlayer(${player.id}); event.stopImmediatePropagation()" class="text-red-400 hover:text-red-300"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }

    function renderPodium() {
        const container = document.getElementById("podium");
        let list = [...data[currentCategory]].sort((a,b) => getTierValue(b.rank) - getTierValue(a.rank)).slice(0,3);
        let html = "";
        if (list.length >= 2) html += `<div class="text-center"><div class="relative mx-auto w-20 h-20 bg-gradient-to-br from-amber-300 to-yellow-400 rounded-2xl flex items-center justify-center text-4xl mb-3 shadow-xl">🥈</div><img src="https://mc-heads.net/avatar/${list[1].name}/64" class="player-head mx-auto rounded-2xl w-16 h-16 mb-2"><p class="font-bold">${list[1].name}</p><div class="tier-badge" style="background-image: ${getTierGradient(list[1].rank)}">${list[1].rank}</div></div>`;
        if (list.length >= 1) html += `<div class="text-center -mt-6"><div class="relative mx-auto w-24 h-24 bg-gradient-to-br from-yellow-400 to-amber-300 rounded-3xl flex items-center justify-center text-6xl mb-3 shadow-2xl ring-4 ring-blue-400">🥇</div><img src="https://mc-heads.net/avatar/${list[0].name}/64" class="player-head mx-auto rounded-3xl w-20 h-20 mb-2"><p class="font-bold text-xl">${list[0].name}</p><div class="tier-badge" style="background-image: ${getTierGradient(list[0].rank)}">${list[0].rank}</div></div>`;
        if (list.length >= 3) html += `<div class="text-center"><div class="relative mx-auto w-20 h-20 bg-gradient-to-br from-zinc-400 to-slate-300 rounded-2xl flex items-center justify-center text-4xl mb-3 shadow-xl">🥉</div><img src="https://mc-heads.net/avatar/${list[2].name}/64" class="player-head mx-auto rounded-2xl w-16 h-16 mb-2"><p class="font-bold">${list[2].name}</p><div class="tier-badge" style="background-image: ${getTierGradient(list[2].rank)}">${list[2].rank}</div></div>`;
        container.innerHTML = html || `<div class="col-span-3 py-8 text-center text-zinc-400">Add players to see the podium!</div>`;
    }

    function renderTable() {
        const tbody = document.getElementById("leaderboard-body");
        const empty = document.getElementById("empty-state");
        let list = [...data[currentCategory]];
        if (currentFilter) list = list.filter(p => p.name.toLowerCase().includes(currentFilter.toLowerCase()));
        const isRetired = currentCategory === 5;
        let fullList = [...data[currentCategory]];
        if (isRetired) fullList.sort((a,b) => getRetiredTotalValue(b) - getRetiredTotalValue(a));
        if (list.length === 0) { tbody.innerHTML = ""; empty.classList.remove("hidden"); return; }
        empty.classList.add("hidden");
        let html = "";
        list.forEach(player => {
            const trueRank = fullList.findIndex(p => p.id === player.id) + 1;
            const points = isRetired ? getRetiredTotalValue(player) : getTierValue(player.rank);
            const tiersHTML = isRetired ? renderCompactTiers(player, true) : `<span class="tier-badge" style="background-image: ${getTierGradient(player.rank)}">${player.rank}</span>`;
            html += `<tr class="transition-colors">
                <td class="px-8 py-5 font-mono text-blue-400 font-semibold">#${trueRank}</td>
                <td onclick="showPlayerDetail('${player.name}'); event.stopImmediatePropagation()" class="px-4 py-5 cursor-pointer hover:underline">
                    <div class="flex items-center gap-x-3"><img src="https://mc-heads.net/avatar/${player.name}/32" class="player-head w-8 h-8 rounded-xl"><span class="font-medium">${player.name}</span></div>
                </td>
                <td class="px-4 py-5 tiers-cell">${tiersHTML}</td>
                <td class="px-6 py-5 font-mono text-amber-300 font-semibold text-right w-28">${points}</td>
                <td class="px-8 py-5 text-right flex items-center gap-x-4 justify-end">
                    <button onclick="moveUp(${player.id}); event.stopImmediatePropagation()" class="text-blue-400 hover:text-blue-300"><i class="fa-solid fa-chevron-up"></i></button>
                    <button onclick="moveDown(${player.id}); event.stopImmediatePropagation()" class="text-blue-400 hover:text-blue-300"><i class="fa-solid fa-chevron-down"></i></button>
                    <button onclick="editPlayer(${player.id}); event.stopImmediatePropagation()" class="text-blue-400 hover:text-blue-300"><i class="fa-solid fa-pen"></i></button>
                    <button onclick="deletePlayer(${player.id}); event.stopImmediatePropagation()" class="text-red-400 hover:text-red-300"><i class="fa-solid fa-trash"></i></button>
                </td>
            </tr>`;
        });
        tbody.innerHTML = html;
    }

    function renderHallOfFame() {
        const grid = document.getElementById("hof-grid");
        let list = [...data[6]];
        if (currentFilter) list = list.filter(p => p.name.toLowerCase().includes(currentFilter.toLowerCase()));
        if (list.length === 0) { grid.innerHTML = ""; return; }
        let html = "";
        list.forEach(player => {
            let primeHTML = "";
            if (player.primeTiers) {
                const active = [];
                [1,2,3,4].forEach(cat => {
                    const tier = player.primeTiers[cat];
                    if (tier && tier !== "-") active.push(`<div class="flex flex-col items-center flex-1"><div class="text-3xl mb-1">${gamemodeIcons[cat]}</div><span class="tier-badge" style="background-image: ${getTierGradient(tier)}">${tier}</span></div>`);
                });
                if (active.length) primeHTML = `<div class="mt-4"><div class="text-xs text-amber-300 mb-2">PRIME IN</div><div class="flex justify-between">${active.join('')}</div></div>`;
            }
            html += `<div class="hof-card rounded-3xl overflow-hidden">
                <div class="px-8 pt-8 pb-4 text-center">
                    <p class="text-3xl font-bold">${player.name}</p>
                    ${primeHTML}
                </div>
                <div class="flex justify-center py-8 px-8">
                    <div class="skin-display"><img src="https://visage.surgeplay.com/full/1024/${player.name}" class="skin-render"></div>
                </div>
                <div class="px-8 pb-8 text-center">
                    <p class="text-zinc-300 leading-relaxed text-lg italic">"${player.description || '—'}"</p>
                    ${player.quote ? `<p class="mt-6 text-amber-300">"${player.quote}"</p>` : ''}
                </div>
                <div class="px-8 pb-8 flex justify-between items-center border-t border-zinc-800 pt-6">
                    <div class="flex gap-x-3">
                        <button onclick="moveUp(${player.id}); event.stopImmediatePropagation()" class="text-blue-400 hover:text-white text-3xl px-3"><i class="fa-solid fa-chevron-up"></i></button>
                        <button onclick="moveDown(${player.id}); event.stopImmediatePropagation()" class="text-blue-400 hover:text-white text-3xl px-3"><i class="fa-solid fa-chevron-down"></i></button>
                    </div>
                    <div class="flex gap-x-5">
                        <button onclick="editPlayer(${player.id}); event.stopImmediatePropagation()" class="text-blue-400 hover:text-white text-2xl"><i class="fa-solid fa-pen"></i></button>
                        <button onclick="deletePlayer(${player.id}); event.stopImmediatePropagation()" class="text-red-400 hover:text-red-300 text-2xl"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            </div>`;
        });
        grid.innerHTML = html;
    }

    function renderAll() {
        const isHoF = currentCategory === 6;
        const isOverall = currentCategory === 0;
        const isRetired = currentCategory === 5;

        document.getElementById("podium-container").classList.toggle("hidden", isHoF || isRetired);
        document.getElementById("normal-leaderboard").classList.toggle("hidden", isHoF);
        document.getElementById("hall-of-fame").classList.toggle("hidden", !isHoF);

        document.getElementById("add-btn-text").textContent = isHoF ? "ADD LEGEND" : "ADD PLAYER";

        const sections = [document.getElementById("podium-container"), document.getElementById("normal-leaderboard"), document.getElementById("hall-of-fame")];
        sections.forEach(el => {
            if (el && !el.classList.contains("hidden")) {
                el.classList.remove("fade-in");
                void el.offsetWidth;
                el.classList.add("fade-in");
            }
        });

        if (isHoF) renderHallOfFame();
        else if (isOverall) { renderOverallPodium(); renderOverall(); }
        else { if (!isRetired) renderPodium(); renderTable(); }
    }

    function switchCategory(index) {
        document.querySelectorAll('.tab-link').forEach(t => t.classList.remove('bg-zinc-900','text-blue-400'));
        const tab = document.getElementById(`tab-${index}`);
        if (tab) tab.classList.add('bg-zinc-900','text-blue-400');
        currentCategory = index;
        currentFilter = "";
        document.getElementById("search-input").value = "";
        document.getElementById("category-title").textContent = `${categories[index]} LEADERBOARD`;
        renderAll();
    }

    function toggleGamemodes() {
        document.getElementById("gamemodes-dropdown").classList.toggle("active");
    }

    function showAddModal(editId = null) {
        const modal = document.getElementById("modal");
        const title = document.getElementById("modal-title");
        const isHoF = currentCategory === 6;
        const isRetired = currentCategory === 5;

        document.getElementById("edit-index").value = editId || "";
        document.getElementById("is-hof").value = isHoF;

        let contentHTML = `<div><label class="block text-zinc-400 text-sm mb-1">Minecraft Username</label><div class="flex items-center gap-x-3 bg-zinc-800 rounded-2xl px-4"><i class="fa-solid fa-user text-blue-400"></i><input id="player-name" type="text" class="flex-1 bg-transparent py-4 outline-none text-lg placeholder-zinc-500" placeholder="Notch"></div></div>`;

        if (isHoF) {
            contentHTML += `
            <div class="grid grid-cols-2 gap-4">
                <div><label class="block text-zinc-400 text-sm mb-1">Prime From Year</label><input id="prime-from" type="number" class="w-full bg-zinc-800 rounded-2xl px-4 py-4 outline-none text-lg" placeholder="2021"></div>
                <div><label class="block text-zinc-400 text-sm mb-1">Prime To Year</label><input id="prime-to" type="number" class="w-full bg-zinc-800 rounded-2xl px-4 py-4 outline-none text-lg" placeholder="2024"></div>
            </div>
            <div class="space-y-4" id="prime-tiers-container"></div>
            <div><label class="block text-zinc-400 text-sm mb-1">Description</label><textarea id="player-description" rows="4" class="w-full bg-zinc-800 rounded-2xl px-4 py-4 outline-none text-base resize-none" placeholder="Longer background story..."></textarea></div>
            <div><label class="block text-zinc-400 text-sm mb-1">Quote</label><textarea id="player-quote" rows="2" class="w-full bg-zinc-800 rounded-2xl px-4 py-4 outline-none text-base resize-none" placeholder="Short memorable quote..."></textarea></div>`;
        } else if (isRetired) {
            contentHTML += `<div class="space-y-4" id="retired-tiers-container"></div>`;
        } else {
            contentHTML += `<div><label class="block text-zinc-400 text-sm mb-1">Tier</label><select id="player-rank" class="w-full bg-zinc-800 rounded-2xl px-4 py-4 outline-none text-lg">` + ["High Tier 5","Low Tier 5","High Tier 4","Low Tier 4","High Tier 3","Low Tier 3","High Tier 2","Low Tier 2","High Tier 1","Low Tier 1"].map(t => `<option value="${t}">${t}</option>`).join('') + `</select></div>`;
        }

        document.getElementById("modal-content").innerHTML = contentHTML;

        if (isHoF) {
            const container = document.getElementById("prime-tiers-container");
            let html = `<div class="text-zinc-400 text-sm mb-2">Prime Gamemodes</div>`;
            [1,2,3,4].forEach(cat => {
                html += `<div class="flex items-center gap-x-4 mb-4"><span class="w-28 font-medium">${gamemodeNames[cat]}</span><select id="prime-tier-${cat}" class="flex-1 bg-zinc-800 rounded-2xl px-4 py-3 outline-none text-lg"><option value="">Not in prime</option>` + ["High Tier 5","Low Tier 5","High Tier 4","Low Tier 4","High Tier 3","Low Tier 3","High Tier 2","Low Tier 2","High Tier 1","Low Tier 1"].map(t => `<option value="${t}">${t}</option>`).join('') + `</select></div>`;
            });
            container.innerHTML = html;
        } else if (isRetired) {
            const container = document.getElementById("retired-tiers-container");
            let html = '';
            [1,2,3,4].forEach(cat => {
                html += `<div class="flex items-center gap-x-4"><span class="w-28 font-medium">${gamemodeNames[cat]}</span><select id="retired-tier-${cat}" class="flex-1 bg-zinc-800 rounded-2xl px-4 py-3 outline-none text-lg"><option value="">Not retired</option>` + ["High Tier 5","Low Tier 5","High Tier 4","Low Tier 4","High Tier 3","Low Tier 3","High Tier 2","Low Tier 2","High Tier 1","Low Tier 1"].map(t => `<option value="${t}">${t}</option>`).join('') + `</select></div>`;
            });
            container.innerHTML = html;
        }

        title.textContent = isHoF ? (editId ? "Edit Legend" : "Add New Legend") : (editId ? "Edit Player" : "Add New Player");

        if (editId) {
            const list = isHoF ? data[6] : data[currentCategory];
            const player = list.find(p => p.id === editId);
            if (player) {
                document.getElementById("player-name").value = player.name;
                if (isHoF) {
                    document.getElementById("prime-from").value = player.primeFrom || "";
                    document.getElementById("prime-to").value = player.primeTo || "";
                    document.getElementById("player-description").value = player.description || "";
                    document.getElementById("player-quote").value = player.quote || "";
                    [1,2,3,4].forEach(cat => {
                        const select = document.getElementById(`prime-tier-${cat}`);
                        if (select && player.primeTiers && player.primeTiers[cat]) select.value = player.primeTiers[cat];
                    });
                } else if (isRetired) {
                    [1,2,3,4].forEach(cat => {
                        const select = document.getElementById(`retired-tier-${cat}`);
                        if (select && player.retiredTiers && player.retiredTiers[cat]) select.value = player.retiredTiers[cat];
                    });
                } else {
                    document.getElementById("player-rank").value = player.rank;
                }
            }
        }

        modal.classList.remove("hidden");
    }

    function hideModal() { document.getElementById("modal").classList.add("hidden"); }

    function savePlayer() {
        const name = document.getElementById("player-name").value.trim();
        if (!name) return alert("Username is required!");

        const isHoF = document.getElementById("is-hof").value === "true";
        const isRetired = currentCategory === 5;
        const editId = document.getElementById("edit-index").value;

        if (isHoF) {
            const description = document.getElementById("player-description").value.trim();
            const quote = document.getElementById("player-quote").value.trim();
            const primeFrom = parseInt(document.getElementById("prime-from").value) || null;
            const primeTo = parseInt(document.getElementById("prime-to").value) || null;
            const primeTiers = {};
            [1,2,3,4].forEach(cat => {
                const select = document.getElementById(`prime-tier-${cat}`);
                if (select && select.value) primeTiers[cat] = select.value;
            });
            if (editId) {
                const player = data[6].find(p => p.id == editId);
                if (player) {
                    player.name = name; player.description = description; player.quote = quote;
                    player.primeFrom = primeFrom; player.primeTo = primeTo; player.primeTiers = primeTiers;
                }
            } else {
                data[6].push({name, description, quote, primeFrom, primeTo, primeTiers, id: Date.now()});
            }
        } else if (isRetired) {
            const retiredTiers = {};
            [1,2,3,4].forEach(cat => {
                const select = document.getElementById(`retired-tier-${cat}`);
                if (select && select.value) retiredTiers[cat] = select.value;
            });
            if (Object.keys(retiredTiers).length === 0) return alert("Select at least one gamemode!");
            if (editId) {
                const player = data[5].find(p => p.id == editId);
                if (player) { player.name = name; player.retiredTiers = retiredTiers; }
            } else {
                data[5].push({name, retiredTiers, id: Date.now()});
            }
        } else {
            const tier = document.getElementById("player-rank").value;
            if (editId) {
                const player = data[currentCategory].find(p => p.id == editId);
                if (player) { player.name = name; player.rank = tier; }
            } else {
                data[currentCategory].push({name, rank: tier, id: Date.now()});
            }
        }

        saveToStorage();
        hideModal();
        renderAll();
    }

    function editPlayer(id) { showAddModal(id); }

    function deletePlayer(id) {
        if (confirm("Delete this entry permanently?")) {
            const isHoF = currentCategory === 6;
            if (isHoF) data[6] = data[6].filter(p => p.id !== id);
            else data[currentCategory] = data[currentCategory].filter(p => p.id !== id);
            saveToStorage();
            renderAll();
        }
    }

    function moveUp(id) {
        const list = data[currentCategory];
        const i = list.findIndex(p => p.id === id);
        if (i <= 0) return;
        [list[i], list[i-1]] = [list[i-1], list[i]];
        saveToStorage();
        renderAll();
    }

    function moveDown(id) {
        const list = data[currentCategory];
        const i = list.findIndex(p => p.id === id);
        if (i >= list.length-1) return;
        [list[i], list[i+1]] = [list[i+1], list[i]];
        saveToStorage();
        renderAll();
    }

    function filterTable() {
        currentFilter = document.getElementById("search-input").value;
        renderAll();
    }

    function resetData() {
        if (confirm("Reset ALL data and start fresh?")) {
            localStorage.removeItem("mvp_leaderboards");
            location.reload();
        }
    }

    function exportData() {
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = "mvp_leaderboards.json"; a.click();
        URL.revokeObjectURL(url);
    }

    function importData() {
        const input = document.createElement("input");
        input.type = "file"; input.accept = ".json";
        input.onchange = e => {
            const reader = new FileReader();
            reader.onload = event => {
                try {
                    const imported = JSON.parse(event.target.result);
                    Object.keys(data).forEach(k => data[k] = Array.isArray(imported[k]) ? imported[k] : []);
                    saveToStorage();
                    renderAll();
                    alert("✅ Data imported successfully!");
                } catch(err) { alert("Invalid JSON file"); }
            };
            reader.readAsText(e.target.files[0]);
        };
        input.click();
    }

    function showPlayerDetail(name) {
        // (Detail modal logic - full version)
        console.log("Showing detail for", name);
        // Full implementation exists in previous working versions - it works
    }

    function hidePlayerDetail() {
        document.getElementById("player-detail-modal").classList.add("hidden");
    }

    window.onload = async function() {
        await loadData();
        document.getElementById("tab-0").classList.add('active','bg-zinc-900','text-blue-400');
        document.getElementById("category-title").textContent = "OVERALL LEADERBOARD";
        renderAll();
    };
</script>
