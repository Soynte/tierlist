<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyPvP • Leaderboards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Press+Start+2P&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .header-font { font-family: 'Press Start 2P', sans-serif; }

        .tier-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 9999px; display: inline-flex; align-items: center; justify-content: center; background: #52525b; color: transparent; background-clip: text; -webkit-background-clip: text; box-shadow: 0 2px 8px rgba(0,0,0,0.3); white-space: nowrap; }
        .modal { animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes modalPop { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        .player-head { border: 3px solid #18181b; box-shadow: 0 0 15px rgba(59,130,246,0.3); transition: transform 0.2s ease; }
        .player-head:hover { transform: scale(1.08); }

        .preview-skin { border: 3px solid #eab308; box-shadow: 0 0 20px rgba(234,179,8,0.4); }

        .hof-card { transition: all 0.4s cubic-bezier(0.4,0,0.2,1); background: linear-gradient(145deg,#18181b,#111113); border: 2px solid #3b82f6; box-shadow: 0 0 40px -10px rgb(59 130 246); }
        .hof-card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 25px 50px -15px rgb(59 130 246); border-color: #eab308; }

        .leaderboard-table tr { transition: all 0.2s ease; }
        .leaderboard-table tr:hover { background-color: #27272a; transform: translateX(3px); }

        .dropdown-content, .tierpoints-dropdown-content, .achievements-dropdown-content { display: none !important; }
        .dropdown.active .dropdown-content, .tierpoints-dropdown.active .tierpoints-dropdown-content, .achievements-dropdown.active .achievements-dropdown-content { display: block !important; }

        .podium-wrapper { display: flex; justify-content: center; align-items: flex-end; gap: 12px; }
        .podium-step { text-align: center; transition: all 0.3s ease; color: #000 !important; font-weight: 700; }
        .podium-2 { background: linear-gradient(#e2e8f0,#94a3b8); height: 130px; width: 110px; border-radius: 12px 12px 0 0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 12px; }
        .podium-1 { background: linear-gradient(#fcd34d,#f59e0b); height: 180px; width: 130px; border-radius: 12px 12px 0 0; box-shadow: 0 15px 25px -5px rgb(234 179 8); display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 16px; position: relative; }
        .podium-1::before { content: "👑"; position: absolute; top: -32px; left: 50%; transform: translateX(-50%); font-size: 34px; }
        .podium-3 { background: linear-gradient(#d1d5db,#78716c); height: 100px; width: 110px; border-radius: 12px 12px 0 0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 12px; }
        .podium-name { font-size: 15px; line-height: 1.1; max-width: 110px; word-break: break-word; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

<header class="bg-black border-b border-zinc-800 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-x-3">
            <div class="w-9 h-9 bg-blue-500 rounded-xl flex items-center justify-center text-2xl shadow-lg shadow-blue-500/50">⚔️</div>
            <div>
                <h1 class="header-font text-2xl tracking-wider text-blue-400">MyPvP</h1>
                <p class="text-xs text-zinc-500 -mt-1">LEADERBOARDS</p>
            </div>
        </div>

        <nav class="flex items-center gap-x-2 sm:gap-x-6 text-sm font-medium">
            <a href="#" onclick="switchCategory(0)" id="tab-0" class="tab-link px-3 sm:px-4 py-2 rounded-xl hover:bg-zinc-900 transition-colors">OVERALL</a>
            <div id="gamemodes-dropdown" class="relative dropdown">
                <button onclick="toggleGamemodes(event)" class="flex items-center gap-x-1 sm:gap-x-2 px-4 py-2 rounded-2xl hover:bg-zinc-900 transition-colors text-sm">
                    <span class="hidden sm:inline">GAME MODES</span>
                    <span class="sm:hidden">MODES</span>
                    <i class="fa-solid fa-chevron-down chevron"></i>
                </button>
                <div id="dropdown-content" class="dropdown-content absolute top-full left-0 mt-2 w-56 bg-zinc-900 rounded-2xl shadow-2xl border border-zinc-700 py-2 z-50">
                    <a href="#" onclick="switchCategory(1); event.stopImmediatePropagation()" id="tab-1" class="tab-link block px-6 py-3 hover:bg-zinc-800">CLASSIC</a>
                    <a href="#" onclick="switchCategory(2); event.stopImmediatePropagation()" id="tab-2" class="tab-link block px-6 py-3 hover:bg-zinc-800">UHC</a>
                    <a href="#" onclick="switchCategory(3); event.stopImmediatePropagation()" id="tab-3" class="tab-link block px-6 py-3 hover:bg-zinc-800">ONLY SWORD</a>
                    <a href="#" onclick="switchCategory(4); event.stopImmediatePropagation()" id="tab-4" class="tab-link block px-6 py-3 hover:bg-zinc-800">POT</a>
                </div>
            </div>
            <a href="#" onclick="switchCategory(5)" id="tab-5" class="tab-link px-3 sm:px-4 py-2 rounded-xl hover:bg-zinc-900 transition-colors">RETIRED</a>
            <a href="#" onclick="switchCategory(6)" id="tab-6" class="tab-link px-3 sm:px-4 py-2 rounded-xl hover:bg-zinc-900 transition-colors">HALL OF FAME</a>
        </nav>

        <div class="flex items-center gap-x-3">
            <button onclick="exportJSON()" class="flex items-center gap-x-2 bg-emerald-500 hover:bg-emerald-600 px-4 py-2.5 rounded-2xl font-semibold text-sm transition-colors"><i class="fa-solid fa-download"></i><span class="hidden sm:inline">Export JSON</span></button>
            <button id="admin-btn" onclick="showLoginModal()" class="flex items-center gap-x-2 bg-zinc-700 hover:bg-zinc-600 px-4 py-2.5 rounded-2xl font-semibold text-sm transition-colors"><i class="fa-solid fa-lock"></i><span id="admin-btn-text">Admin Login</span></button>
            <button onclick="showAddModal()" id="add-btn" class="flex items-center gap-x-2 bg-blue-500 hover:bg-blue-600 px-4 sm:px-5 py-2.5 rounded-2xl font-semibold text-sm transition-colors admin-only hidden"><i class="fa-solid fa-plus"></i><span>ADD PLAYER</span></button>
            <button onclick="resetData()" class="flex items-center gap-x-2 bg-zinc-800 hover:bg-zinc-700 px-3 py-2.5 rounded-2xl text-sm transition-colors admin-only hidden"><i class="fa-solid fa-rotate-right"></i></button>
        </div>
    </div>
</header>

<main class="max-w-7xl mx-auto px-4 sm:px-6 py-8">
    <div id="podium-container"><div id="podium" class="podium-wrapper mb-10"></div></div>
    
    <div id="normal-leaderboard" class="bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800 shadow-2xl transition-all">
        <div class="px-4 sm:px-8 py-5 border-b border-zinc-800 flex flex-wrap items-center justify-between gap-4">
            <h2 id="category-title" class="text-2xl font-semibold header-font tracking-widest">OVERALL LEADERBOARD</h2>
            <div class="flex items-center gap-4">
                <div id="tierpoints-dropdown" class="tierpoints-dropdown relative">
                    <button onclick="toggleTierpointsDropdown(event)" class="flex items-center gap-x-2 bg-zinc-800 hover:bg-zinc-700 px-5 py-2 rounded-2xl text-sm font-medium">Tierpoints <i id="tier-chevron" class="fa-solid fa-chevron-down text-xs"></i></button>
                    <div id="tierpoints-content" class="tierpoints-dropdown-content absolute top-full right-0 mt-2 bg-zinc-900 rounded-2xl shadow-2xl border border-zinc-700 py-3 px-4 w-64 z-50"></div>
                </div>
                <div id="achievements-dropdown" class="achievements-dropdown relative">
                    <button onclick="toggleAchievementsDropdown(event)" class="flex items-center gap-x-2 bg-zinc-800 hover:bg-zinc-700 px-5 py-2 rounded-2xl text-sm font-medium">Achievements <i id="achievements-chevron" class="fa-solid fa-chevron-down text-xs"></i></button>
                    <div id="achievements-content" class="achievements-dropdown-content absolute top-full right-0 mt-2 bg-zinc-900 rounded-2xl shadow-2xl border border-zinc-700 py-3 px-4 w-72 z-50"></div>
                </div>
                <div class="flex items-center gap-x-4 text-sm">
                    <input id="search-input" onkeyup="if(event.key==='Enter') filterTable()" placeholder="Search player..." class="bg-zinc-800 border border-zinc-700 focus:border-blue-400 rounded-2xl px-4 py-2 w-48 sm:w-64 outline-none text-sm">
                    <button onclick="filterTable()" class="px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium"><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
            </div>
        </div>
        <div class="overflow-x-auto">
            <table class="leaderboard-table w-full min-w-full">
                <thead>
                    <tr class="text-zinc-400 text-xs uppercase tracking-widest font-medium">
                        <th class="px-4 sm:px-8 py-5 text-left w-12">#</th>
                        <th class="px-4 py-5 text-left">PLAYER</th>
                        <th class="px-4 py-5 text-left">TIERS</th>
                        <th class="px-4 sm:px-6 py-5 text-right w-24">POINTS</th>
                        <th class="px-4 sm:px-8 py-5 text-right w-20 admin-only hidden">Actions</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body" class="text-sm divide-y divide-zinc-800"></tbody>
            </table>
        </div>
        <div id="empty-state" class="hidden py-16 text-center text-zinc-400"><i class="fa-solid fa-trophy text-6xl mb-4 opacity-30"></i><p class="text-xl">No players yet</p></div>
    </div>

    <div id="hall-of-fame" class="hidden">
        <div class="hof-header rounded-3xl px-6 sm:px-10 py-12 mb-10 text-center">
            <div class="flex justify-center items-center gap-x-4 mb-4"><i class="fa-solid fa-crown text-5xl text-amber-400"></i><h2 class="text-5xl font-semibold header-font tracking-[6px] text-amber-300">HALL OF FAME</h2><i class="fa-solid fa-crown text-5xl text-amber-400"></i></div>
        </div>
        <div id="hof-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
    </div>
</main>

<!-- Login Modal -->
<div id="login-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[1100]">
    <div class="modal bg-zinc-900 rounded-3xl w-full max-w-sm mx-4 p-8">
        <h3 class="text-2xl font-semibold mb-6 text-center">Admin Login</h3>
        <div class="space-y-6">
            <div>
                <label class="block text-zinc-400 text-sm mb-1">Password</label>
                <input id="login-password" type="password" class="w-full bg-zinc-800 rounded-2xl px-4 py-4 outline-none text-lg">
            </div>
        </div>
        <div class="flex gap-x-3 mt-8">
            <button onclick="hideLoginModal()" class="flex-1 py-4 text-zinc-400 hover:bg-zinc-800 rounded-2xl font-medium">Cancel</button>
            <button onclick="attemptLogin()" class="flex-1 py-4 bg-blue-500 hover:bg-blue-600 rounded-2xl font-semibold">Login</button>
        </div>
        <p id="login-error" class="text-red-400 text-center mt-4 text-sm hidden">Wrong password</p>
    </div>
</div>

<!-- Add/Edit Modal -->
<div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[999]">
    <div class="modal bg-zinc-900 rounded-3xl w-full max-w-lg mx-4 p-8">
        <h3 id="modal-title" class="text-2xl font-semibold mb-6">Add / Edit Player</h3>
        <div id="modal-content" class="space-y-6"></div>
        <div class="flex gap-x-3 mt-10">
            <button onclick="hideModal()" class="flex-1 py-4 text-zinc-400 hover:bg-zinc-800 rounded-2xl font-medium">Cancel</button>
            <button onclick="savePlayer()" class="flex-1 py-4 bg-blue-500 hover:bg-blue-600 rounded-2xl font-semibold">Save Changes</button>
        </div>
        <input type="hidden" id="edit-index">
        <input type="hidden" id="edit-mode">
    </div>
</div>

<!-- Player Detail Modal -->
<div id="player-detail-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[1000]">
    <div class="player-detail-modal-content rounded-3xl w-full max-w-md mx-4 overflow-hidden relative">
        <button onclick="hidePlayerDetail()" class="absolute top-4 right-4 text-zinc-400 hover:text-white text-2xl z-10"><i class="fa-solid fa-xmark"></i></button>
        <div class="pt-8 pb-4 text-center">
            <div class="mx-auto w-28 h-28 rounded-full border-4 border-blue-400 overflow-hidden shadow-2xl"><img id="detail-head" src="" class="w-full h-full object-cover"></div>
            <h2 id="detail-name" class="text-3xl font-bold mt-4"></h2>
            <div id="detail-badge" class="inline-flex items-center gap-x-2 bg-gradient-to-r from-amber-400 to-yellow-300 text-zinc-900 text-sm font-semibold px-5 py-1 rounded-3xl mt-2 shadow-inner"></div>
        </div>
        <div class="px-8 py-6 bg-black/30">
            <div class="flex justify-between items-center text-xs text-zinc-400 mb-2"><span>OVERALL POSITION</span></div>
            <div id="detail-position" class="flex items-center gap-x-3 bg-zinc-900 rounded-2xl px-5 py-3 text-lg font-semibold"></div>
        </div>
        <div class="px-8 py-6">
            <div class="text-xs text-zinc-400 mb-3 flex items-center gap-x-2"><i class="fa-solid fa-trophy"></i> TIERS</div>
            <div id="detail-tiers" class="grid grid-cols-4 gap-3"></div>
        </div>
        <div class="px-8 py-6 border-t border-zinc-800 flex justify-center">
            <a id="detail-namemc" href="#" target="_blank" class="flex items-center gap-x-2 bg-zinc-800 hover:bg-zinc-700 transition-colors px-6 py-3 rounded-2xl text-sm font-medium"><i class="fa-solid fa-globe"></i> View on NameMC</a>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCtD6uiy0wSGbYHEYA6kT7DHCthmtVQa4Y",
        authDomain: "tierlist-5078e.firebaseapp.com",
        projectId: "tierlist-5078e",
        storageBucket: "tierlist-5078e.firebasestorage.app",
        messagingSenderId: "1054362121056",
        appId: "1:1054362121056:web:d35fef620a4b1b21e76405",
        measurementId: "G-5JVREFNWC7",
        databaseURL: "https://tierlist-5078e-default-rtdb.europe-west1.firebasedatabase.app"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let data = {1: [], 2: [], 3: [], 4: [], 5: [], 6: []};
    let currentCategory = 0;
    let currentFilter = "";
    let isAdmin = false;

    const ADMIN_SECRET = "4282dd90deae8d7b1eaf9670778503c2f89841124c5d75893f465d5936851b24";

    const tierValueMap = {"High Tier 1":100,"Low Tier 1":90,"High Tier 2":80,"Low Tier 2":70,"High Tier 3":60,"Low Tier 3":50,"High Tier 4":40,"Low Tier 4":30,"High Tier 5":20,"Low Tier 5":10};

    const gamemodeNames = {1:"Classic",2:"UHC",3:"Only Sword",4:"Pot"};
    const gamemodeIcons = {1:"https://subtiers.net/assets/trident-1c1a3e5a.svg",2:"https://mctiers.com/tier_icons/uhc.svg",3:"https://mctiers.com/tier_icons/sword.svg",4:"https://mctiers.com/tier_icons/pot.svg"};

    function getTierGradient(tier) {
        const map = {"High Tier 1":"linear-gradient(90deg, #b45309, #fcd34d)","Low Tier 1":"linear-gradient(90deg, #854d0e, #fde047)","High Tier 2":"linear-gradient(90deg, #6d28d9, #c4b5fd)","Low Tier 2":"linear-gradient(90deg, #5b21b6, #ddd6fe)","High Tier 3":"linear-gradient(90deg, #1e40af, #60a5fa)","Low Tier 3":"linear-gradient(90deg, #0e7490, #67e8f9)","High Tier 4":"linear-gradient(90deg, #166534, #4ade80)","Low Tier 4":"linear-gradient(90deg, #15803d, #86efac)","High Tier 5":"linear-gradient(90deg, #78350f, #d97706)","Low Tier 5":"linear-gradient(90deg, #854d0e, #f59e0b)"};
        return map[tier] || "linear-gradient(90deg, #52525b, #a1a1aa)";
    }

    function getTierValue(tier) { return tierValueMap[tier] || 0; }
    function getRetiredTotalValue(p) { return p && p.retiredTiers ? Object.values(p.retiredTiers).reduce((s,t)=>s+getTierValue(t),0) : 0; }

    function getAchievementTitle(points) {
        if (points >= 400) return "Combat Grandmaster";
        if (points >= 250) return "Combat Master";
        if (points >= 100) return "Combat Ace";
        if (points >= 50) return "Combat Specialist";
        if (points >= 20) return "Combat Cadet";
        if (points >= 10) return "Combat Novice";
        return "Rookie";
    }

    // EXACT NameMC face you showed in the picture
    function getPlayerHeadUrl(player, size = 64) {
        if (player && player.uuid) {
            const scale = Math.round(size / 16);
            return `https://s.namemc.com/2d/skin/face.png?id=${player.uuid}&scale=${scale}`;
        }
        return `https://mc-heads.net/avatar/Steve/${size}?overlay`;
    }

    // Automatic UUID lookup
    async function lookupUUID(username) {
        try {
            const res = await fetch(`https://api.mojang.com/users/profiles/minecraft/${username}`);
            if (res.ok) {
                const json = await res.json();
                return json.id;
            }
        } catch (e) {}
        return null;
    }

    function renderCompactTiers(player) {
        let html = '<div class="flex flex-wrap gap-2">';
        [1,2,3,4].forEach(cat => {
            let tier = "-";
            let suffix = "";
            if (player?.retiredTiers?.[cat]) { tier = player.retiredTiers[cat]; suffix = " (R)"; }
            else if (player?.tiers?.[cat]) tier = player.tiers[cat];
            else if (player?.rank) tier = player.rank;
            html += `<div class="flex flex-col items-center"><img src="${gamemodeIcons[cat]}" class="w-6 h-6 mb-1"><span class="tier-badge" style="background-image: ${getTierGradient(tier)}">${tier}${suffix}</span></div>`;
        });
        html += '</div>';
        return html;
    }

    function renderTierpointsContent() {
        const tiers = [{name:"High Tier 1",pts:100},{name:"Low Tier 1",pts:90},{name:"High Tier 2",pts:80},{name:"Low Tier 2",pts:70},{name:"High Tier 3",pts:60},{name:"Low Tier 3",pts:50},{name:"High Tier 4",pts:40},{name:"Low Tier 4",pts:30},{name:"High Tier 5",pts:20},{name:"Low Tier 5",pts:10}];
        let html = '';
        tiers.forEach(t => html += `<div class="flex justify-between items-center py-1 px-3 rounded-xl hover:bg-zinc-800"><span class="tier-badge" style="background-image: ${getTierGradient(t.name)}">${t.name}</span><span class="font-medium text-amber-300">${t.pts} pts</span></div>`);
        return html;
    }

    function renderAchievementsContent() {
        const titles = [{title:"Combat Grandmaster",points:"400+"},{title:"Combat Master",points:"250+"},{title:"Combat Ace",points:"100+"},{title:"Combat Specialist",points:"50+"},{title:"Combat Cadet",points:"20+"},{title:"Combat Novice",points:"10+"},{title:"Rookie",points:"<10"}];
        let html = '';
        titles.forEach(t => html += `<div class="flex justify-between items-center py-1 px-3 rounded-xl hover:bg-zinc-800"><span class="font-medium text-amber-300">${t.title}</span><span class="font-medium text-zinc-400">${t.points} points</span></div>`);
        return html;
    }

    function toggleTierpointsDropdown(e) { e.stopImmediatePropagation(); const dd = document.getElementById("tierpoints-dropdown"); const isActive = dd.classList.toggle("active"); document.getElementById("tier-chevron").style.transform = isActive ? "rotate(180deg)" : ""; }
    function toggleAchievementsDropdown(e) { e.stopImmediatePropagation(); const dd = document.getElementById("achievements-dropdown"); const isActive = dd.classList.toggle("active"); document.getElementById("achievements-chevron").style.transform = isActive ? "rotate(180deg)" : ""; }
    function toggleGamemodes(e) { e.stopImmediatePropagation(); document.getElementById("gamemodes-dropdown").classList.toggle("active"); }

    document.addEventListener('click', function(e) {
        const gamemodesDD = document.getElementById("gamemodes-dropdown");
        const tierpointsDD = document.getElementById("tierpoints-dropdown");
        const achievementsDD = document.getElementById("achievements-dropdown");
        if (gamemodesDD && !gamemodesDD.contains(e.target)) gamemodesDD.classList.remove("active");
        if (tierpointsDD && !tierpointsDD.contains(e.target)) { tierpointsDD.classList.remove("active"); document.getElementById("tier-chevron").style.transform = ""; }
        if (achievementsDD && !achievementsDD.contains(e.target)) { achievementsDD.classList.remove("active"); document.getElementById("achievements-chevron").style.transform = ""; }
    });

    async function hashPassword(password) {
        const encoder = new TextEncoder();
        const data = encoder.encode(password);
        const hashBuffer = await crypto.subtle.digest('SHA-256', data);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function attemptLogin() {
        const pass = document.getElementById("login-password").value;
        const enteredHash = await hashPassword(pass);
        if (enteredHash === ADMIN_SECRET) {
            isAdmin = true;
            localStorage.setItem("mvp_admin", "true");
            hideLoginModal();
            updateAdminUI();
            renderAll();
        } else {
            document.getElementById("login-error").classList.remove("hidden");
        }
    }

    function showLoginModal() {
        document.getElementById("login-modal").classList.remove("hidden");
        document.getElementById("login-error").classList.add("hidden");
        document.getElementById("login-password").value = "";
    }

    function hideLoginModal() { document.getElementById("login-modal").classList.add("hidden"); }

    function logout() {
        if (confirm("Logout from admin mode?")) {
            isAdmin = false;
            localStorage.removeItem("mvp_admin");
            updateAdminUI();
            renderAll();
        }
    }

    function updateAdminUI() {
        const adminElements = document.querySelectorAll('.admin-only');
        const adminBtn = document.getElementById("admin-btn");
        if (isAdmin) {
            adminElements.forEach(el => el.classList.remove("hidden"));
            adminBtn.innerHTML = `<i class="fa-solid fa-right-from-bracket"></i><span>Logout</span>`;
            adminBtn.onclick = logout;
        } else {
            adminElements.forEach(el => el.classList.add("hidden"));
            adminBtn.innerHTML = `<i class="fa-solid fa-lock"></i><span>Admin Login</span>`;
            adminBtn.onclick = showLoginModal;
        }
    }

    function renderUnifiedPodium(top3, isOverall) {
        const container = document.getElementById("podium");
        let html = `<div class="podium-wrapper">`;

    function renderOverallPodium() {
        const playerMap = new Map();
        [1,2,3,4].forEach(cat => (data[cat]||[]).forEach(p => {
            let entry = playerMap.get(p.name) || {name:p.name,totalValue:0,bestValue:0,uuid:p.uuid};
            const val = getTierValue(p.rank);
            entry.totalValue += val;
            if (val > entry.bestValue) entry.bestValue = val;
            playerMap.set(p.name, entry);
        }));
        let list = Array.from(playerMap.values()).sort((a,b) => b.totalValue - a.totalValue || a.name.localeCompare(b.name)).slice(0,3);
        renderUnifiedPodium(list, true);
    }

    function renderPodium() {
        let list = [...(data[currentCategory]||[])].sort((a,b)=>getTierValue(b.rank)-getTierValue(a.rank)||a.name.localeCompare(b.name)).slice(0,3);
        renderUnifiedPodium(list, false);
    }

    function updateSkinPreview(uuid) {
        const previewContainer = document.getElementById("skin-preview-container");
        const previewImg = document.getElementById("skin-preview");
        if (uuid) {
            const scale = 8;
            previewImg.src = `https://s.namemc.com/2d/skin/face.png?id=${uuid}&scale=${scale}`;

    async function manualLookupUUID() {
        const nameField = document.getElementById("player-name");
        const uuidField = document.getElementById("player-uuid");
        const name = nameField.value.trim();
        if (!name) return alert("Enter a username first!");

        uuidField.placeholder = "Looking up on NameMC...";
        const uuid = await lookupUUID(name);
        uuidField.placeholder = "Will be filled automatically";

        if (uuid) {
            uuidField.value = uuid;
            updateSkinPreview(uuid);
        } else {
            alert("No UUID found for this name – will use Steve skin");
            uuidField.value = "";
            document.getElementById("skin-preview-container").classList.add("hidden");
        }
    }

    function hideModal() { document.getElementById("modal").classList.add("hidden"); }

    async function savePlayer() {
        let name = document.getElementById("player-name").value.trim();
        let uuid = document.getElementById("player-uuid").value.trim();

        if (!name) return alert("Username is required!");

        if (!uuid) {
            const loading = document.getElementById("modal-title");
            const original = loading.textContent;
            loading.textContent = "Looking up UUID on NameMC...";
            uuid = await lookupUUID(name);
            loading.textContent = original;
        }

        const editId = document.getElementById("edit-index").value;
        const editMode = document.getElementById("edit-mode").value;

        if (editMode === "hof") {
            const primeFrom = document.getElementById("prime-from").value;
            const primeTo = document.getElementById("prime-to").value;
            const description = document.getElementById("player-description").value;
            const quote = document.getElementById("player-quote").value;
            const primeTiers = {};
            [1,2,3,4].forEach(cat => {
                const select = document.getElementById(`prime-tier-${cat}`);
                if (select && select.value && select.value !== "") primeTiers[cat] = select.value;
            });

            data[6] = data[6] || [];
            if (editId) {
                const player = data[6].find(p => p.id == editId);
                if (player) {
                    player.name = name;
                    player.uuid = uuid;
                    player.primeFrom = primeFrom;
                    player.primeTo = primeTo;
                    player.description = description;
                    player.quote = quote;
                    player.primeTiers = primeTiers;
                }
            } else {
                data[6].push({name, uuid, primeFrom, primeTo, description, quote, primeTiers, id: Date.now()});
            }
        } else if (editMode === "overall") {
            [1,2,3,4].forEach(cat => {
                data[cat] = data[cat] || [];
                const select = document.getElementById(`tier-${cat}`);
                const desiredTier = select ? select.value : "";
                const idx = data[cat].findIndex(p => p.id == editId);
                if (desiredTier && desiredTier !== "") {
                    if (idx !== -1) {
                        data[cat][idx].rank = desiredTier;
                        data[cat][idx].uuid = uuid;
                    } else {
                        data[cat].push({name, rank: desiredTier, uuid, id: Date.now()});
                    }
                } else if (idx !== -1) data[cat].splice(idx, 1);
            });
        } else if (editMode === "retired") {
            const retiredTiers = {};
            [1,2,3,4].forEach(cat => {
                const select = document.getElementById(`tier-${cat}`);
                if (select && select.value && select.value !== "") retiredTiers[cat] = select.value;
            });
            data[5] = data[5] || [];
            if (editId) {
                const player = data[5].find(p => p.id == editId);
                if (player) {
                    player.retiredTiers = retiredTiers;
                    player.uuid = uuid;
                }
            } else {
                data[5].push({name, retiredTiers, uuid, id: Date.now()});
            }
        } else {
            const tier = document.getElementById("tier-" + currentCategory).value;
            data[currentCategory] = data[currentCategory] || [];
            if (editId) {
                const player = data[currentCategory].find(p => p.id == editId);
                if (player) {
                    if (tier && tier !== "") player.rank = tier;
                    else data[currentCategory] = data[currentCategory].filter(p => p.id != editId);
                    player.uuid = uuid;
                }
            } else if (tier && tier !== "") {
                data[currentCategory].push({name, rank: tier, uuid, id: Date.now()});
            }
        }

        saveToStorage();
        hideModal();
        renderAll();
    }

    function editPlayer(id) { showAddModal(id, false); }
    function editPlayerFromOverall(name) {
        let id = null;
        for (let cat = 1; cat <= 4; cat++) {
            const player = (data[cat]||[]).find(p => p.name === name);
            if (player) { id = player.id; break; }
        }
        if (id) showAddModal(id, true);
        else alert("Could not find player for editing.");
    }

    function deletePlayer(id) {
        if (confirm("Delete this entry permanently?")) {
            const isHoF = currentCategory === 6;
            if (isHoF) data[6] = (data[6]||[]).filter(p => p.id !== id);
            else data[currentCategory] = (data[currentCategory]||[]).filter(p => p.id !== id);
            saveToStorage();
            renderAll();
        }
    }

    function deletePlayerByName(name) {
        if (confirm("Delete this entry permanently?")) {
            const isHoF = currentCategory === 6;
            if (isHoF) data[6] = (data[6]||[]).filter(p => p.name !== name);
            else data[currentCategory] = (data[currentCategory]||[]).filter(p => p.name !== name);
            saveToStorage();
            renderAll();
        }
    }

    function moveUp(id) {
        const list = data[currentCategory] || [];
        const i = list.findIndex(p => p.id === id);
        if (i <= 0) return;
        [list[i], list[i-1]] = [list[i-1], list[i]];
        saveToStorage();
        renderAll();
    }

    function moveDown(id) {
        const list = data[currentCategory] || [];
        const i = list.findIndex(p => p.id === id);
        if (i >= list.length-1) return;
        [list[i], list[i+1]] = [list[i+1], list[i]];
        saveToStorage();
        renderAll();
    }

    function filterTable() {
        currentFilter = document.getElementById("search-input").value;
        renderAll();
    }

    function resetData() {
        if (confirm("Reset ALL data and start fresh?")) {
            data = {1: [], 2: [], 3: [], 4: [], 5: [], 6: []};
            saveToStorage();
            renderAll();
        }
    }

    function showPlayerDetail(name) {
        let playerData = {};
        let totalPoints = 0;
        let currentPlayer = null;
        [1,2,3,4].forEach(cat => {
            const p = (data[cat]||[]).find(pl => pl.name === name);
            if (p) {
                playerData[cat] = p.rank;
                totalPoints += getTierValue(p.rank);
                if (!currentPlayer) currentPlayer = p;
            }
        });
        const retiredPlayer = (data[5]||[]).find(pl => pl.name === name);
        if (retiredPlayer) {
            playerData.retiredTiers = retiredPlayer.retiredTiers;
            if (!currentPlayer) currentPlayer = retiredPlayer;
        }
        const playerMap = new Map();
        [1,2,3,4].forEach(cat => (data[cat]||[]).forEach(p => {
            let entry = playerMap.get(p.name) || {name:p.name,totalValue:0};
            entry.totalValue += getTierValue(p.rank);
            playerMap.set(p.name, entry);
        }));
        const ranked = Array.from(playerMap.values()).sort((a,b)=>b.totalValue-a.totalValue||a.name.localeCompare(b.name));
        const overallRank = ranked.findIndex(p => p.name === name) + 1;
        const achievement = getAchievementTitle(totalPoints);

        document.getElementById("detail-name").textContent = name;
        document.getElementById("detail-head").src = getPlayerHeadUrl(currentPlayer || {name}, 128);
        const badgeEl = document.getElementById("detail-badge");
        badgeEl.innerHTML = `<i class="fa-solid fa-fire"></i> ${achievement}`;
        document.getElementById("detail-position").innerHTML = `<div class="text-4xl font-bold text-amber-400">#${overallRank}</div><div><div class="text-blue-400 font-semibold">OVERALL</div><div class="text-xs text-zinc-400">${totalPoints} points</div></div><i class="fa-solid fa-trophy text-3xl text-amber-400"></i>`;
        let tiersHTML = '';
        [1,2,3,4].forEach(cat => {
            const tier = playerData[cat] || (playerData.retiredTiers && playerData.retiredTiers[cat]) || '-';
            const isRetired = playerData.retiredTiers && playerData.retiredTiers[cat];
            const gradient = getTierGradient(tier);
            tiersHTML += `<div class="text-center"><img src="${gamemodeIcons[cat]}" class="w-8 h-8 mx-auto mb-1"><div class="text-xs text-zinc-400">${gamemodeNames[cat]}</div><span class="tier-badge mx-auto block mt-1" style="background-image: ${gradient}">${tier}${isRetired ? ' (R)' : ''}</span></div>`;
        });
        document.getElementById("detail-tiers").innerHTML = tiersHTML;
        document.getElementById("detail-namemc").href = `https://namemc.com/profile/${name}`;
        const modal = document.getElementById("player-detail-modal");
        modal.classList.remove("hidden");
        modal.classList.add("flex");
    }

    function hidePlayerDetail() {
        const modal = document.getElementById("player-detail-modal");
        modal.classList.add("hidden");
        modal.classList.remove("flex");
    }

    function exportJSON() {
        const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "mvp_leaderboards.json";
        a.click();
    }

    function loadFromFirebase() {
        db.ref('leaderboards').on('value', (snapshot) => {
            const fbData = snapshot.val();
            if (fbData) data = fbData;
            renderAll();
        });
    }

    function saveToStorage() { db.ref('leaderboards').set(data); }

    window.onload = function() {
        if (localStorage.getItem("mvp_admin") === "true") isAdmin = true;
        updateAdminUI();
        loadFromFirebase();
        document.getElementById("tab-0").classList.add('bg-zinc-900','text-blue-400');
        document.getElementById("category-title").textContent = "OVERALL LEADERBOARD";
        renderAll();
    };
</script>
</body>
</html>
